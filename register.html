<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DzzXNzz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/loading.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-green: #00ff88;
        }
        body {
            background-color: #020202;
            background-image: 
                linear-gradient(rgba(0,229,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .register-card {
            background: rgba(18,20,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-cyan);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 20px var(--neon-cyan);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--neon-green);
            margin: -60px auto 20px;
            overflow: hidden;
            box-shadow: 0 0 20px var(--neon-green);
            background: #111;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            text-align: center;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-cyan);
            font-size: 28px;
        }
        input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-green));
            border: none;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-register:hover {
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 20px var(--neon-green);
            transform: scale(1.02);
        }
        .links {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #aaa;
        }
        .links a {
            color: var(--neon-green);
            text-decoration: none;
            transition: 0.2s;
        }
        .links a:hover {
            text-shadow: 0 0 8px var(--neon-green);
        }
        .message {
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
            min-height: 20px;
        }
        .error { color: #ff5555; }
        .success { color: var(--neon-green); }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .loading-overlay .loader-rings {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .loading-overlay .loading-text {
            color: white;
            font-size: 18px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-rings">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
        </div>
        <div class="loading-text" id="loadingText">Processing...</div>
    </div>

    <div class="register-card">
        <div class="profile-avatar">
            <img src="./image/profile.jpg" alt="Profile" onerror="this.src='https://ui-avatars.com/api/?name=User&background=020202&color=00e5ff&bold=true'">
        </div>

        <h1><i class="fas fa-user-plus"></i> Register</h1>
        
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="new-password">
        <input type="password" id="confirmPassword" placeholder="Ulangi Password">
        
        <div id="message" class="message"></div>
        
        <button class="btn-register" onclick="handleRegister()">Register</button>

        <div class="links">
            <a href="login.html">Sudah Punya Akun? Login</a>
        </div>
    </div>

    <script>
        const messageEl = document.getElementById('message')
        const loadingOverlay = document.getElementById('loadingOverlay')
        const loadingText = document.getElementById('loadingText')
        let loadingInterval

        function showLoading(text) {
            loadingOverlay.classList.add('active')
            loadingText.textContent = text + ' ...'
            let dots = 0
            loadingInterval = setInterval(() => {
                dots = (dots + 1) % 4
                loadingText.textContent = text + ' ' + '.'.repeat(dots)
            }, 500)
        }

        function hideLoading() {
            clearInterval(loadingInterval)
            loadingOverlay.classList.remove('active')
        }

        async function handleRegister() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const confirm = document.getElementById('confirmPassword').value

            if (!email || !password || !confirm) {
                showMessage('Semua field harus diisi', 'error')
                return
            }
            if (password.length < 6) {
                showMessage('Password minimal 6 karakter', 'error')
                return
            }
            if (password !== confirm) {
                showMessage('Password tidak cocok', 'error')
                return
            }

            showMessage('Memproses...', '')
            showLoading('Registering')

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name: email.split('@')[0] })
                })
                const data = await res.json()
                hideLoading()

                if (!res.ok) throw new Error(data.error)

                showMessage('Registrasi berhasil! Silakan login.', 'success')
                document.getElementById('password').value = ''
                document.getElementById('confirmPassword').value = ''

            } catch (err) {
                hideLoading()
                showMessage('Error: ' + err.message, 'error')
            }
        }

        function showMessage(text, type) {
            messageEl.textContent = text
            messageEl.className = 'message ' + type
        }

        // Canvas stars (sama seperti login)
        (function() {
            const canvas = document.getElementById('canvas')
            if (!canvas) return
            const ctx = canvas.getContext('2d')
            let stars = []
            const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight }
            const createStars = () => {
                stars = []
                for (let i = 0; i < 70; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 1.5,
                        speed: Math.random() * 0.2 + 0.1
                    })
                }
            }
            const draw = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height)
                ctx.fillStyle = "rgba(0, 229, 255, 0.15)"
                stars.forEach(s => {
                    ctx.beginPath()
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2)
                    ctx.fill()
                    s.y += s.speed
                    if (s.y > canvas.height) s.y = 0
                })
                requestAnimationFrame(draw)
            }
            window.addEventListener('resize', () => { resize(); createStars() })
            resize(); createStars(); draw()
        })()
    </script>
</body>
</html>
