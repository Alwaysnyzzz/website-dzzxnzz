<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukses - DzzXNzz</title>
    <!-- CSS Global -->
    <link rel="stylesheet" href="../style.css">
    <!-- CSS Khusus Success -->
    <link rel="stylesheet" href="../css/success.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Sembunyikan menu toggle di navbar */
        .navbar #menu-toggle {
            display: none;
        }
        .nav-left {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Navbar tanpa tombol menu -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="nav-brand">DzzXNzz</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">COINS: 0</div>
            <div class="user-avatar">
                <img src="../image/profile.jpg" alt="User" onerror="this.src='https://ui-avatars.com/api/?name=User&background=020202&color=00e5ff&bold=true'">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="success-card" id="successCard" style="display: none;">
            <h2 class="success-title">✔ Pembayaran Berhasil</h2>
            <div class="success-detail" id="transactionDetail">
                <!-- Data akan diisi oleh JavaScript -->
                <div class="detail-row">
                    <span class="detail-label">Produk :</span>
                    <span class="detail-value" id="produk">QRIS Donation</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Payment :</span>
                    <span class="detail-value" id="payment">QRIS</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Layanan :</span>
                    <span class="detail-value" id="layanan">Pakasir</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Order ID :</span>
                    <span class="detail-value" id="order-id">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Waktu :</span>
                    <span class="detail-value" id="waktu">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Tanggal :</span>
                    <span class="detail-value" id="tanggal">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Status :</span>
                    <span class="detail-value status-done">done</span>
                </div>
            </div>

            <!-- Tombol Aksi -->
            <div class="action-buttons">
                <button class="btn-home" id="btnHome">
                    <i class="fas fa-home"></i> Kembali ke Home
                </button>
                <button class="btn-struk" id="btnStruk">
                    <i class="fas fa-receipt"></i> Lihat Struk
                </button>
            </div>
        </div>
    </main>

    <!-- Loading Overlay (saat memuat data) -->
    <div class="loading-overlay active" id="loadingOverlay">
        <div class="loader-rings">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
        </div>
        <div class="loading-text" id="loadingText">Memuat struk...</div>
    </div>

    <!-- Script Khusus Success -->
    <script src="../js/success.js"></script>
    <!-- Script Global (hanya untuk canvas) -->
    <script src="../script.js"></script>
</body>
</html>
