<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - DzzXNzz</title>
    <!-- CSS Global -->
    <link rel="stylesheet" href="../style.css">
    <!-- CSS Khusus Pay -->
    <link rel="stylesheet" href="../css/pay.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        /* Sembunyikan menu toggle di navbar */
        .navbar #menu-toggle {
            display: none;
        }
        .nav-left {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Navbar tanpa tombol menu -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="nav-brand">DzzXNzz</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">COINS: 0</div>
            <div class="user-avatar">
                <img src="../image/profile.jpg" alt="User" onerror="this.src='https://ui-avatars.com/api/?name=User&background=020202&color=00e5ff&bold=true'">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="payment-card">
            <!-- Timer -->
            <div class="timer-container" id="timer">
                <i class="fas fa-hourglass-half"></i> Menghitung...
            </div>

            <!-- QR Code Frame -->
            <div class="qr-frame">
                <div id="qrcode"></div>
            </div>

            <!-- Download Button -->
            <button class="btn-download" id="downloadBtn">
                <i class="fas fa-download"></i> DOWNLOAD QR
            </button>

            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn btn-primary" id="cek-status">
                    <i class="fas fa-sync-alt"></i> CEK STATUS
                </button>
                <button class="btn btn-danger" id="batalkan">
                    <i class="fas fa-times-circle"></i> BATALKAN
                </button>
            </div>
        </div>
    </main>

    <!-- Loading Overlay (untuk proses) -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-rings">
            <div class="ring ring-outer"></div>
            <div class="ring ring-inner"></div>
        </div>
        <div class="loading-text" id="loadingText">Memproses...</div>
    </div>

    <!-- Modal Pending (status masih pending) -->
    <div class="modal-overlay" id="pendingModal">
        <div class="modal-card">
            <div class="modal-icon">
                <i class="fas fa-hourglass-half" style="color: #ffaa00;"></i>
            </div>
            <h3 class="modal-title" style="color: #ffaa00;">Status Pending</h3>
            <p class="modal-message">Status masih pending, silahkan lakukan pembayaran.</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-primary" id="pendingOk" style="border-color: #ffaa00; color: #ffaa00;">OKE</button>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Batalkan -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <div class="modal-icon">
                <i class="fas fa-question-circle" style="color: #ffaa00;"></i>
            </div>
            <h3 class="modal-title">Konfirmasi</h3>
            <p class="modal-message">Apakah Anda yakin ingin membatalkan transaksi ini?</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-danger" id="confirmYa" style="border-color: #ff5555; color: #ff5555;">YA</button>
                <button class="modal-btn modal-btn-primary" id="confirmTidak" style="border-color: #00ff88; color: #00ff88;">TIDAK</button>
            </div>
        </div>
    </div>

    <!-- Script Khusus Pay -->
    <script src="../js/pay.js"></script>
    <!-- Script Global (hanya untuk canvas) -->
    <script src="../script.js"></script>
</body>
</html>
