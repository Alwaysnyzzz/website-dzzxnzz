<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - DzzXNzz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .rainbow-title {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff, #00ff88, #bf00ff, #ff0055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,229,255,0.5));
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #aaa;
            font-size: 16px;
            text-align: center;
            margin-bottom: 40px;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .contact-card {
            background: rgba(18,20,26,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .contact-card:hover {
            transform: translateY(-5px);
        }
        .card-wa {
            border-color: #25D366;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.3);
        }
        .card-tg {
            border-color: #0088cc;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.3);
        }
        .card-bot {
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        }
        .contact-card i {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .card-wa i { color: #25D366; }
        .card-tg i { color: #0088cc; }
        .card-bot i { color: #ff4444; }
        .btn-contact {
            display: inline-block;
            padding: 10px 25px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid;
            background: transparent;
            transition: 0.2s;
        }
        .card-wa .btn-contact {
            border-color: #25D366;
            color: #25D366;
        }
        .card-wa .btn-contact:hover {
            background: #25D366;
            color: black;
        }
        .card-tg .btn-contact {
            border-color: #0088cc;
            color: #0088cc;
        }
        .card-tg .btn-contact:hover {
            background: #0088cc;
            color: black;
        }
        .card-bot .btn-contact {
            border-color: #ff4444;
            color: #ff4444;
        }
        .card-bot .btn-contact:hover {
            background: #ff4444;
            color: black;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar">...(sama) ...</nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">...</div>
        <ul class="sidebar-menu">
            <li><a href="home"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="product"><i class="fas fa-box"></i> Product</a></li>
            <li><a href="donasi"><i class="fas fa-heart"></i> Donasi</a></li>
            <li class="active"><a href="contact"><i class="fas fa-phone-alt"></i> Contact</a></li>
        </ul>
        <div class="sidebar-divider"></div>
        <ul class="sidebar-menu sidebar-system" id="system-menu">
            <li class="system-item"><a href="#"><i class="fas fa-spinner fa-pulse"></i> Loading...</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="rainbow-title">Kontak Kami</h1>
        <p class="subtitle">Hubungi kami melalui platform berikut</p>

        <div class="contact-grid">
            <div class="contact-card card-wa">
                <i class="fab fa-whatsapp"></i>
                <h3>WhatsApp</h3>
                <p>Chat langsung dengan admin</p>
                <a href="/contact/wa" class="btn-contact">Lihat Detail</a>
            </div>
            <div class="contact-card card-tg">
                <i class="fab fa-telegram-plane"></i>
                <h3>Telegram</h3>
                <p>Hubungi admin via Telegram</p>
                <a href="/contact/telegram" class="btn-contact">Lihat Detail</a>
            </div>
            <div class="contact-card card-bot">
                <i class="fas fa-robot"></i>
                <h3>Bot</h3>
                <p>Bot interaktif 24/7</p>
                <a href="#" class="btn-contact">Lihat Detail</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">...(sama) ...</footer>
    <script src="script.js"></script>
</body>
</html>
