<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran - DzzXNzz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        @keyframes fadeInUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shineBar { 0%{background-position:0%} 100%{background-position:200%} }
        @keyframes spin { to{transform:rotate(360deg)} }
        @keyframes spinR { to{transform:rotate(-360deg)} }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.95)} }

        body { font-family: 'Nunito', sans-serif; }
        .navbar #menu-toggle { display: none; }

        .main-content { padding: 90px 20px 40px; max-width: 480px; margin: 0 auto; }

        .payment-card {
            background: rgba(13,15,25,0.92);
            backdrop-filter: blur(18px);
            border-radius: 26px; padding: 28px 24px;
            border: 1px solid rgba(0,229,255,0.25);
            box-shadow: 0 0 40px rgba(0,229,255,0.1), 0 25px 60px rgba(0,0,0,0.7);
            position: relative; overflow: hidden;
            animation: fadeInUp 0.6s ease;
        }
        .payment-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #00e5ff, #00ff88, #bf00ff, #00e5ff);
            background-size: 200% 100%; animation: shineBar 3s linear infinite;
            border-radius: 26px 26px 0 0;
        }

        /* Header */
        .pay-header { text-align: center; margin-bottom: 20px; }
        .pay-title { font-family: 'Righteous', cursive; font-size: 22px; color: #fff; margin-bottom: 4px; }
        .pay-amount {
            font-family: 'Righteous', cursive; font-size: 36px;
            color: #00e5ff; filter: drop-shadow(0 0 12px rgba(0,229,255,0.5));
        }
        .pay-order { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 700; margin-top: 4px; letter-spacing: 0.5px; }

        /* Timer */
        .timer-container {
            background: rgba(255,85,85,0.1);
            border: 1.5px solid rgba(255,85,85,0.4);
            border-radius: 14px; padding: 12px 20px;
            margin-bottom: 20px; text-align: center;
            color: #ff5555; font-weight: 900; font-size: 22px;
            letter-spacing: 2px; box-shadow: 0 0 20px rgba(255,85,85,0.15);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .timer-container.expired {
            background: rgba(255,0,0,0.15);
            border-color: #ff0000; color: #ff0000;
        }

        /* Auto-check badge */
        .auto-check-badge {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(0,255,136,0.07); border: 1px solid rgba(0,255,136,0.2);
            border-radius: 10px; padding: 8px 14px; margin-bottom: 16px;
            font-size: 12px; font-weight: 700; color: #00ff88;
        }
        .auto-check-badge i { animation: pulse 1.5s infinite; }

        /* QR Code */
        .qr-frame {
            background: rgba(0,0,0,0.3);
            border: 2px dashed rgba(0,229,255,0.35);
            border-radius: 18px; padding: 20px;
            margin-bottom: 16px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 230px;
            position: relative;
        }
        .qr-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.35); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
        #qrcode canvas { width: 190px !important; height: 190px !important; border-radius: 10px; padding: 6px; background: white; }

        /* Download */
        .btn-download {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: fit-content; margin: 0 auto 18px;
            background: transparent; border: 1.5px solid rgba(0,255,136,0.4);
            color: #00ff88; padding: 10px 24px; border-radius: 40px;
            font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.25s;
        }
        .btn-download:hover { background: rgba(0,255,136,0.12); box-shadow: 0 0 20px rgba(0,255,136,0.25); }

        /* Action buttons */
        .btn-group { display: flex; gap: 12px; }
        .btn {
            flex: 1; padding: 13px 0; border-radius: 40px;
            font-weight: 900; font-size: 14px; cursor: pointer;
            transition: 0.25s; border: 1.5px solid; background: transparent;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: 'Nunito', sans-serif; letter-spacing: 0.3px;
        }
        .btn-primary { border-color: #00e5ff; color: #00e5ff; }
        .btn-primary:hover { background: rgba(0,229,255,0.12); box-shadow: 0 0 20px rgba(0,229,255,0.25); }
        .btn-danger { border-color: #ff5555; color: #ff5555; }
        .btn-danger:hover { background: rgba(255,85,85,0.12); box-shadow: 0 0 20px rgba(255,85,85,0.25); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Loading overlay */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .loader-rings { position: relative; width: 70px; height: 70px; margin-bottom: 20px; }
        .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
        .ring-outer { width: 100%; height: 100%; border-top-color: #00e5ff; border-bottom-color: #00e5ff; animation: spin 1.5s linear infinite; }
        .ring-inner { width: 46px; height: 46px; top: 12px; left: 12px; border-left-color: #bf00ff; border-right-color: #bf00ff; animation: spinR 1.5s linear infinite; }
        .loading-text { color: #00e5ff; font-size: 15px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px #00e5ff; }

        /* Modals */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.78); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9998; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-card {
            background: rgba(10,12,22,0.98); border-radius: 22px; padding: 32px 26px;
            max-width: 320px; width: 90%; text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            transform: scale(0.9); transition: 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-overlay.show .modal-card { transform: scale(1); }
        .modal-icon { font-size: 52px; margin-bottom: 14px; }
        .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 8px; color: #fff; }
        .modal-message { color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 600; margin-bottom: 22px; line-height: 1.6; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1; padding: 12px 0; border-radius: 40px;
            font-weight: 900; font-size: 14px; border: 1.5px solid;
            background: transparent; cursor: pointer; transition: 0.2s;
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <nav class="navbar">
        <div class="nav-left">

        </div>
        <div class="nav-right">
            <div class="coins-wrapper">🪙 <span id="coinCount">0</span> +</div>
            <div class="user-avatar"><img src="../image/profile.jpg" alt="User" onerror="this.src='https://ui-avatars.com/api/?name=User&background=06070f&color=00e5ff&bold=true'"></div>
        </div>
    </nav>

    <main class="main-content">
        <div class="payment-card">
            <div class="pay-header">
                <div class="pay-title">🔒 Scan & Bayar</div>
                <div class="pay-amount" id="payAmount">Rp -</div>
                <div class="pay-order" id="payOrder">Order ID: -</div>
            </div>

            <div class="timer-container" id="timer">
                <i class="fas fa-hourglass-half"></i> <span id="timerText">Menghitung...</span>
            </div>

            <div class="auto-check-badge">
                <i class="fas fa-circle"></i>
                <span>Auto-cek pembayaran tiap 5 detik</span>
            </div>

            <div class="qr-frame">
                <div class="qr-label">Scan QR Code di bawah</div>
                <div id="qrcode"></div>
            </div>

            <button class="btn-download" id="downloadBtn">
                <i class="fas fa-download"></i> Download QR
            </button>

            <div class="btn-group">
                <button class="btn btn-primary" id="cekStatusBtn">
                    <i class="fas fa-sync-alt"></i> Cek Status
                </button>
                <button class="btn btn-danger" id="batalkanBtn">
                    <i class="fas fa-times-circle"></i> Batalkan
                </button>
            </div>
        </div>
    </main>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-rings"><div class="ring ring-outer"></div><div class="ring ring-inner"></div></div>
        <div class="loading-text" id="loadingText">Memproses...</div>
    </div>

    <!-- Modal Pending -->
    <div class="modal-overlay" id="pendingModal">
        <div class="modal-card">
            <div class="modal-icon">⏳</div>
            <h3 class="modal-title" style="color:#ffaa00">Belum Dibayar</h3>
            <p class="modal-message">Pembayaran belum diterima. Silakan scan QR dan selesaikan pembayaran.</p>
            <div class="modal-actions">
                <button class="modal-btn" id="pendingOk" style="border-color:#ffaa00;color:#ffaa00">OKE</button>
            </div>
        </div>
    </div>

    <!-- Modal Konfirmasi Batal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <div class="modal-icon">❓</div>
            <h3 class="modal-title">Batalkan Transaksi?</h3>
            <p class="modal-message">Transaksi akan dibatalkan dan tidak bisa dikembalikan.</p>
            <div class="modal-actions">
                <button class="modal-btn" id="confirmYa" style="border-color:#ff5555;color:#ff5555">Ya, Batalkan</button>
                <button class="modal-btn" id="confirmTidak" style="border-color:#00ff88;color:#00ff88">Tidak</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="pay.js"></script>
</body>
</html>
