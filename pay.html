<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Pembayaran - DzzXNzz</title>
    <!-- CSS utama -->
    <link rel="stylesheet" href="style.css">
    <!-- CSS khusus pay -->
    <link rel="stylesheet" href="css/pay.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Library QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="nav-brand">DzzXNzz Website</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">COINS: 0</div>
            <div class="user-avatar">
                <img src="https://ui-avatars.com/api/?name=Always+Nyzzz&background=020202&color=00e5ff&bold=true" alt="User">
            </div>
        </div>
    </nav>

    <!-- Sidebar (disembunyikan via CSS) -->
    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>

    <!-- Konten Utama -->
    <main>
        <div class="pay-container">
            <div class="pay-card">
                <div class="timer-container" id="timer">⏳ Menghitung...</div>
                <div class="qr-frame">
                    <div id="qrcode"></div>
                </div>
                <button class="btn-download" id="downloadBtn">📥 DOWNLOAD QR</button>
                <div class="btn-group">
                    <button class="btn" id="cek-status">🔄 CEK STATUS</button>
                    <button class="btn btn-red" id="batalkan">❌ BATALKAN</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
        <div class="loading-text" id="loadingText">loading ...</div>
    </div>

    <!-- Modal Batalkan -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <p>Apakah Anda Yakin Ingin Membatalkan Transaksi Ini?</p>
            <div class="modal-buttons">
                <button class="modal-btn ya" id="modalYa">Ya</button>
                <button class="modal-btn tidak" id="modalTidak">Tidak</button>
            </div>
        </div>
    </div>

    <!-- Modal Pending -->
    <div class="modal-overlay pending-modal" id="pendingModal">
        <div class="modal-card">
            <p>Status masih pending, silahkan lakukan pembayaran</p>
            <div class="modal-buttons">
                <button class="modal-btn ok" id="pendingOk">OK</button>
            </div>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="checkmark-circle">
            <div class="checkmark"></div>
        </div>
        <div class="success-message">Terima Kasih!</div>
        <div class="success-submessage">Uang Anda sangat bermanfaat untuk pengembangan website ini.</div>
        <button class="btn-bukti" id="btnBukti">📄 Bukti Pembayaran</button>
    </div>

    <!-- Script utama (root) -->
    <script src="script.js"></script>
    <!-- Script khusus pay -->
    <script src="js/pay.js"></script>
</body>
</html>
