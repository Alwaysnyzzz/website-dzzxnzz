<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donasi - DzzXNzz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .rainbow-title {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff, #00ff88, #bf00ff, #ff0055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0,229,255,0.5));
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #aaa;
            font-size: 16px;
            text-align: center;
            margin-bottom: 40px;
        }
        .donasi-container {
            max-width: 500px;
            margin: 0 auto;
        }
        .donasi-card {
            background: rgba(18,20,26,0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--neon-red);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px var(--neon-red);
        }
        .donasi-card h3 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--neon-red);
            text-align: center;
            text-shadow: 0 0 8px var(--neon-red);
        }
        .donasi-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 15px 20px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        .donasi-input:focus {
            border-color: var(--neon-red);
            box-shadow: 0 0 20px var(--neon-red);
        }
        .error-message {
            color: #ff5555;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
            display: none;
        }
        .error-message.show { display: block; }
        .donasi-btn {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            padding: 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .donasi-btn:hover {
            background: var(--neon-red);
            color: black;
            box-shadow: 0 0 30px var(--neon-red);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar">...(sama seperti index) ...</nav>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">...</div>
        <ul class="sidebar-menu">
            <li><a href="home"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="product"><i class="fas fa-box"></i> Product</a></li>
            <li class="active"><a href="donasi"><i class="fas fa-heart"></i> Donasi</a></li>
            <li><a href="contact"><i class="fas fa-phone-alt"></i> Contact</a></li>
        </ul>
        <div class="sidebar-divider"></div>
        <ul class="sidebar-menu sidebar-system" id="system-menu">
            <li class="system-item"><a href="#"><i class="fas fa-spinner fa-pulse"></i> Loading...</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="rainbow-title">❤️ DONASI</h1>
        <p class="subtitle">Dukung pengembangan website ini</p>

        <div class="donasi-container">
            <div class="donasi-card">
                <h3>Input Donasi</h3>
                <input type="number" class="donasi-input" id="amount" placeholder="Masukkan nominal (Rp)" min="500" step="100">
                <div class="error-message" id="errorMessage">Minimal donasi Rp 500</div>
                <button class="donasi-btn" id="donasi-btn">DONASI SEKARANG</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">...(sama) ...</footer>
    <script src="script.js"></script>
    <script>
        document.getElementById('donasi-btn')?.addEventListener('click', function(e) {
            e.preventDefault();
            const amount = document.getElementById('amount').value;
            const errorMsg = document.getElementById('errorMessage');
            if (!amount || amount < 500) {
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }
            errorMsg.classList.remove('show');
            alert('Fitur donasi akan segera diintegrasikan');
        });
    </script>
</body>
</html>
