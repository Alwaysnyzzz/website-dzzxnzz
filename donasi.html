<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donasi - DzzXNzz Website</title>
    <!-- style utama (root) + style khusus donasi (folder css) -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/donasi.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="canvas"></canvas>

    <nav class="navbar">
        <div class="nav-left">
            <button id="menu-toggle">☰</button>
            <span class="nav-brand">DzzXNzz Website</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">COINS: 0</div>
            <div class="user-avatar">
                <img src="https://ui-avatars.com/api/?name=Always+Nyzzz&background=020202&color=00e5ff&bold=true" alt="User">
            </div>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="user-name-text">Alwaysnyzzz</span>
            <div class="sidebar-pfp">
                <img src="https://ui-avatars.com/api/?name=Always+Nyzzz&background=020202&color=00e5ff&bold=true" alt="PFP">
            </div>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index">🏠 Home</a></li>
            <li><a href="#">📦 Product</a></li>
            <li class="active"><a href="donasi">❤️ Donasi</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <main>
        <div class="donasi-page">
            <h1 class="donasi-title">❤️ DONASI</h1>
            <p class="donasi-desc">Banyak kamu yang berjaya, sekecil apapun berarti.</p>

            <div class="donasi-card">
                <h3>Input Donasi</h3>
                <input type="number" class="donasi-input" placeholder="Masukkan nominal (Rp)" min="1000" step="1000">
                <button class="donasi-btn">DONASI SEKARANG</button>
            </div>
        </div>
    </main>

    <!-- Script utama (root) + script khusus donasi (folder js) -->
    <script src="script.js"></script>
    <script src="js/donasi.js"></script>
</body>
</html>
