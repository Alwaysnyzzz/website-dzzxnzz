<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - DzzXNzz</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .detail-container { max-width:500px; margin:100px auto; padding:20px; }
        .detail-card { background:rgba(18,20,26,0.8); backdrop-filter:blur(8px); border-radius:24px; padding:30px; border:2px solid #25D366; box-shadow:0 20px 40px rgba(0,0,0,0.5); }
        .detail-title { color:#25D366; font-size:36px; text-align:center; margin-bottom:30px; text-shadow:0 0 20px #25D366; }
        .info-item { background:rgba(0,0,0,0.3); border-radius:15px; padding:15px; margin-bottom:15px; border-left:4px solid #25D366; }
        .info-label { color:#25D366; font-size:18px; font-weight:600; margin-bottom:8px; }
        .info-content { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
        .info-text { color:white; font-size:14px; word-break:break-word; }
        .btn-hubungi { display:inline-block; background:black; border:2px solid #25D366; color:#25D366; padding:8px 20px; border-radius:30px; text-decoration:none; font-weight:600; transition:0.2s; }
        .btn-hubungi:hover { background:#25D366; color:black; }
        .btn-back { display:block; background:transparent; border:2px solid var(--neon-cyan); color:var(--neon-cyan); padding:12px 20px; border-radius:40px; text-align:center; text-decoration:none; font-weight:bold; margin-top:30px; }
        .btn-back:hover { background:var(--neon-cyan); color:black; }
    </style>
</head>

            <span class="nav-brand">DzzXNzz</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">COINS: 0</div>
            <div class="user-avatar"><img src="https://ui-avatars.com/api/?name=Always+Nyzzz&background=020202&color=00e5ff&bold=true" alt="User"></div>
        </div>
    </nav>

    <main class="main-content">
        <div class="detail-container">

                        <span class="info-text">wa.me/6287713472756</span>
                        <a href="https://wa.me/6287713472756" target="_blank" class="btn-hubungi"><i class="fab fa-whatsapp"></i> Hubungi</a>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-label">No Cadangan</div>
                    <div class="info-content">
                        <span class="info-text">wa.me/6288989695549</span>
                        <a href="https://wa.me/6288989695549" target="_blank" class="btn-hubungi"><i class="fab fa-whatsapp"></i> Hubungi</a>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-label">Channel Testi</div>
                    <div class="info-content">
                        <span class="info-text">WhatsApp Channel</span>
                        <a href="https://whatsapp.com/channel/0029Vb6YWHPJ3juqr8vzSc1d" target="_blank" class="btn-hubungi" style="background:#25D366; color:black;">Kunjungi</a>
                    </div>
                </div>

                <a href="../contact" class="btn-back">Kembali ke Contact</a>
            </div>
        </div>
    </main>

    <footer class="footer">...</footer>

</body>
