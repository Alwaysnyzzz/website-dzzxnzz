<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - DzzXNzz</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020202; }
        .detail-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
        }
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .back-button:hover {
            background: #ff4444;
            color: black;
        }
        .detail-card {
            background: rgba(18,20,26,0.8);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 30px;
            border: 2px solid #25D366;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .detail-title {
            color: #25D366;
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #25D366;
        }
        .info-item {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #25D366;
        }
        .info-label {
            color: #25D366;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .info-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info-text {
            color: white;
            font-size: 14px;
            word-break: break-word;
        }
        .btn-action {
            display: inline-block;
            background: black;
            border: 2px solid #25D366;
            color: #25D366;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-action:hover {
            background: #25D366;
            color: black;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="detail-container">
        <!-- Tombol kembali ke contact -->
        <a href="../contact" class="back-button"><i class="fas fa-arrow-left"></i> Kembali</a>

        <div class="detail-card">
            <h1 class="detail-title"><i class="fab fa-whatsapp"></i> WhatsApp</h1>

            <div class="info-item">
                <div class="info-label">No Utama</div>
                <div class="info-content">
                    <span class="info-text">wa.me/6287713472756</span>
                    <a href="https://wa.me/6287713472756" target="_blank" class="btn-action">Hubungi</a>
                </div>
            </div>

            <div class="info-item">
                <div class="info-label">No Cadangan</div>
                <div class="info-content">
                    <span class="info-text">wa.me/6288989695549</span>
                    <a href="https://wa.me/6288989695549" target="_blank" class="btn-action">Hubungi</a>
                </div>
            </div>

            <div class="info-item">
                <div class="info-label">Channel Testi</div>
                <div class="info-content">
                    <span class="info-text">WhatsApp Channel</span>
                    <a href="https://whatsapp.com/channel/0029Vb6YWHPJ3juqr8vzSc1d" target="_blank" class="btn-action" style="background:#25D366; color:black;">Kunjungi</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
