<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram - DzzXNzz</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Navbar dimodifikasi: tombol kembali merah di kiri */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.15);
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-back-nav {
            display: flex;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: 1.5px solid #ff4444;
            color: #ff4444;
            padding: 6px 12px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-back-nav:hover {
            background: #ff4444;
            color: black;
            box-shadow: 0 0 15px #ff4444;
        }

        .nav-brand {
            color: var(--neon-cyan);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        .coins-wrapper {
            border: 1.5px solid var(--neon-cyan);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: bold;
            color: var(--neon-cyan);
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border: 1.5px solid var(--neon-cyan);
            border-radius: 50%;
            overflow: hidden;
            background: #111;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-container {
            max-width: 450px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }

        /* Gaya card seperti di home, warna biru */
        .info-card {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid #0088cc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.2);
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .info-card:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 0 25px #0088cc;
            border-color: #0088cc;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .info-label {
            color: #0088cc;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 0 5px #0088cc;
        }

        .info-status {
            color: #0088cc;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .info-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-text {
            color: white;
            font-size: 14px;
            word-break: break-word;
        }

        .btn-action {
            display: inline-block;
            background: transparent;
            border: 1.5px solid #0088cc;
            color: #0088cc;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: #0088cc;
            color: black;
            box-shadow: 0 0 20px #0088cc;
        }

        button, a, .btn, .btn-back-nav {
            outline: none;
        }

        .sidebar, .overlay {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <nav class="navbar">
        <div class="nav-left">
            <a href="../contact" class="btn-back-nav">
                <span style="font-size: 18px;">←</span> Kembali
            </a>
            <span class="nav-brand">DzzXNzz Website</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">COINS: 0</div>
            <div class="user-avatar">
                <img src="https://ui-avatars.com/api/?name=Always+Nyzzz&background=020202&color=00e5ff&bold=true" alt="User">
            </div>
        </div>
    </nav>

    <main>
        <div class="detail-container">
            <!-- Akun Utama -->
            <div class="info-card">
                <div class="info-header">
                    <span class="info-label">Akun Utama</span>
                    <span class="info-status">ONLINE</span>
                </div>
                <div class="info-content">
                    <span class="info-text">t.me/DzzXNzz</span>
                    <a href="https://t.me/DzzXNzz" target="_blank" class="btn-action">Hubungi</a>
                </div>
            </div>

            <!-- Akun Cadangan -->
            <div class="info-card">
                <div class="info-header">
                    <span class="info-label">Akun Cadangan</span>
                    <span class="info-status">ONLINE</span>
                </div>
                <div class="info-content">
                    <span class="info-text">t.me/dzznyzz</span>
                    <a href="https://t.me/dzznyzz" target="_blank" class="btn-action">Hubungi</a>
                </div>
            </div>

            <!-- Channel Testi -->
            <div class="info-card">
                <div class="info-header">
                    <span class="info-label">Channel Testi</span>
                    <span class="info-status">AKTIF</span>
                </div>
                <div class="info-content">
                    <span class="info-text">t.me/aboutbotnyzz</span>
                    <a href="https://t.me/aboutbotnyzz" target="_blank" class="btn-action">Kunjungi</a>
                </div>
            </div>
        </div>
    </main>

    <script src="../script.js"></script>
</body>
</html>
