<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram - DzzXNzz</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-container {
            max-width: 450px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        .detail-title {
            color: #0088cc;
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #0088cc;
            animation: fadeInUp 0.6s ease;
        }
        .info-card {
            background: rgba(255,255,255,0.03);
            border: 1.5px solid #0088cc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.3);
            backdrop-filter: blur(2px);
            animation: fadeInUp 0.6s ease;
            animation-fill-mode: both;
        }
        .info-card:nth-child(2) { animation-delay: 0.2s; }
        .info-card:nth-child(3) { animation-delay: 0.4s; }
        .info-card:nth-child(4) { animation-delay: 0.6s; }
        .info-label {
            color: #0088cc;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #0088cc;
        }
        .info-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info-text {
            color: white;
            font-size: 14px;
            word-break: break-word;
        }
        .btn-action {
            display: inline-block;
            background: transparent;
            border: 1.5px solid #0088cc;
            color: #0088cc;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-action:hover {
            background: #0088cc;
            color: black;
            box-shadow: 0 0 20px #0088cc;
            transform: scale(1.05);
        }
        .btn-back {
            display: block;
            background: transparent;
            border: 1.5px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 25px;
            border-radius: 30px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            margin-top: 40px;
            transition: 0.2s;
            animation: fadeInUp 0.6s ease 0.8s both;
        }
        .btn-back:hover {
            background: var(--neon-cyan);
            color: black;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        @media (max-width: 400px) {
            .info-content {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn-action {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <nav class="navbar">... (salin dari wa.html) ...</nav>
    <div class="sidebar" id="sidebar">... (salin dari wa.html) ...</div>
    <div class="overlay" id="overlay"></div>
    <main>
        <div class="detail-container">
            <h2 class="detail-title">Telegram</h2>
            <div class="info-card">
                <div class="info-label">Akun Utama</div>
                <div class="info-content">
                    <span class="info-text">t.me/DzzXNzz</span>
                    <a href="https://t.me/DzzXNzz" target="_blank" class="btn-action">Hubungi</a>
                </div>
            </div>
            <div class="info-card">
                <div class="info-label">Akun Cadangan</div>
                <div class="info-content">
                    <span class="info-text">t.me/dzznyzz</span>
                    <a href="https://t.me/dzznyzz" target="_blank" class="btn-action">Hubungi</a>
                </div>
            </div>
            <div class="info-card">
                <div class="info-label">Channel Testi</div>
                <div class="info-content">
                    <span class="info-text">t.me/aboutbotnyzz</span>
                    <a href="https://t.me/aboutbotnyzz" target="_blank" class="btn-action">Kunjungi</a>
                </div>
            </div>
            <a href="../contact" class="btn-back">Kembali ke Contact</a>
        </div>
    </main>
    <script src="../script.js"></script>
</body>
</html>
