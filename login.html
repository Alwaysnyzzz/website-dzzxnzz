<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DzzXNzz</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Gaya khas DzzXNzz */
        body {
            background-color: #020202;
            background-image: linear-gradient(rgba(0,229,255,0.08) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,229,255,0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-card {
            background: rgba(18,20,26,0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-cyan, #00e5ff);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        h1 {
            text-align: center;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
        }
        .btn-login {
            background: var(--neon-cyan);
            border: none;
            color: black;
        }
        .btn-login:hover {
            box-shadow: 0 0 20px var(--neon-cyan);
        }
        .btn-register {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
        }
        .btn-register:hover {
            background: var(--neon-cyan);
            color: black;
        }
        .message {
            text-align: center;
            margin: 15px 0;
            font-size: 14px;
            min-height: 20px;
        }
        .error {
            color: #ff5555;
        }
        .success {
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1><i class="fas fa-lock"></i> Login</h1>
        
        <input type="email" id="email" placeholder="Email" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        
        <div id="message" class="message"></div>
        
        <button class="btn-login" onclick="handleLogin()">Login</button>
        <button class="btn-register" onclick="handleRegister()">Register</button>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        const messageEl = document.getElementById('message')

        async function handleLogin() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value

            if (!email || !password) {
                showMessage('Email dan password harus diisi', 'error')
                return
            }

            showMessage('Memproses...', '')

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                const data = await res.json()

                if (!res.ok) throw new Error(data.error)

                // Simpan session di localStorage (opsional)
                localStorage.setItem('sb-session', JSON.stringify(data.session))
                
                showMessage('Login berhasil! Mengalihkan...', 'success')
                setTimeout(() => {
                    window.location.href = 'dashboard.html'
                }, 1000)

            } catch (err) {
                showMessage('Error: ' + err.message, 'error')
            }
        }

        async function handleRegister() {
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value

            if (!email || !password) {
                showMessage('Email dan password harus diisi', 'error')
                return
            }

            if (password.length < 6) {
                showMessage('Password minimal 6 karakter', 'error')
                return
            }

            showMessage('Memproses...', '')

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                const data = await res.json()

                if (!res.ok) throw new Error(data.error)

                showMessage(data.message || 'Registrasi berhasil!', 'success')
                // Kosongkan password
                document.getElementById('password').value = ''

            } catch (err) {
                showMessage('Error: ' + err.message, 'error')
            }
        }

        function showMessage(text, type) {
            messageEl.textContent = text
            messageEl.className = 'message ' + type
        }
    </script>
</body>
</html>
