<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Pembayaran - DzzXNzz</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes successPop { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
        @keyframes shineBar { 0%{background-position:0%} 100%{background-position:200%} }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        @keyframes spin { to{transform:rotate(360deg)} }
        @keyframes spinR { to{transform:rotate(-360deg)} }

        body { font-family: 'Nunito', sans-serif; }
        .navbar #menu-toggle { display: none; }
        .main-content { padding: 90px 20px 50px; max-width: 460px; margin: 0 auto; }

        /* Confetti */
        .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
        .confetti-piece {
            position: absolute; top: -20px; width: 10px; height: 10px;
            border-radius: 2px; animation: confettiFall linear forwards;
        }

        /* Loading state */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(6,7,15,0.95); backdrop-filter: blur(8px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9998; transition: 0.4s;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; }
        .loader-rings { position: relative; width: 70px; height: 70px; margin-bottom: 20px; }
        .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
        .ring-outer { width: 100%; height: 100%; border-top-color: #00e5ff; border-bottom-color: #00e5ff; animation: spin 1.5s linear infinite; }
        .ring-inner { width: 46px; height: 46px; top: 12px; left: 12px; border-left-color: #00ff88; border-right-color: #00ff88; animation: spinR 1.5s linear infinite; }
        .loading-text { color: #00e5ff; font-size: 15px; font-weight: 800; letter-spacing: 2px; text-shadow: 0 0 10px #00e5ff; }

        /* Struk card */
        .struk-card {
            background: rgba(13,15,25,0.92);
            backdrop-filter: blur(18px);
            border-radius: 26px; padding: 0;
            border: 1px solid rgba(0,255,136,0.3);
            box-shadow: 0 0 40px rgba(0,255,136,0.12), 0 25px 60px rgba(0,0,0,0.7);
            overflow: hidden;
            animation: fadeInUp 0.7s ease;
        }

        /* Top rainbow bar */
        .struk-bar {
            height: 4px;
            background: linear-gradient(90deg, #00ff88, #00e5ff, #bf00ff, #ffe000, #00ff88);
            background-size: 200% 100%; animation: shineBar 3s linear infinite;
        }

        .struk-body { padding: 28px 24px; }

        /* Success icon */
        .success-icon-wrap {
            text-align: center; margin-bottom: 20px;
        }
        .success-icon {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0,255,136,0.12);
            border: 3px solid #00ff88;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px; color: #00ff88;
            box-shadow: 0 0 35px rgba(0,255,136,0.35);
            margin: 0 auto 14px;
            animation: successPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .success-title {
            font-family: 'Righteous', cursive; font-size: 24px;
            color: #00ff88; filter: drop-shadow(0 0 10px rgba(0,255,136,0.5));
            margin-bottom: 4px;
        }
        .success-sub { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 700; }

        /* Coins added badge */
        .coins-added {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.25);
            border-radius: 14px; padding: 14px 20px; margin: 18px 0;
        }
        .coins-added-icon { font-size: 28px; animation: coinFloat 2s ease-in-out infinite; }
        @keyframes coinFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
        .coins-added-label { font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .coins-added-amount { font-family: 'Righteous', cursive; font-size: 24px; color: #00e5ff; filter: drop-shadow(0 0 8px rgba(0,229,255,0.5)); }

        /* Divider */
        .struk-divider {
            display: flex; align-items: center; gap: 10px; margin: 18px 0;
        }
        .struk-divider::before, .struk-divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .struk-divider span { font-size: 11px; color: rgba(255,255,255,0.25); font-weight: 800; letter-spacing: 1px; white-space: nowrap; }

        /* Detail rows */
        .detail-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
        .detail-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 12px 16px;
        }
        .detail-row-label { display: flex; align-items: center; gap: 10px; }
        .detail-row-label i { font-size: 14px; width: 18px; text-align: center; color: rgba(255,255,255,0.35); }
        .detail-row-label span { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 700; }
        .detail-row-value { font-size: 13px; color: #fff; font-weight: 900; text-align: right; max-width: 55%; word-break: break-all; }
        .detail-row-value.green { color: #00ff88; filter: drop-shadow(0 0 5px rgba(0,255,136,0.4)); }
        .detail-row-value.cyan { color: #00e5ff; }

        /* Action buttons */
        .struk-actions { display: flex; gap: 12px; }
        .struk-btn {
            flex: 1; padding: 14px 0; border-radius: 40px;
            font-weight: 900; font-size: 14px; border: 1.5px solid;
            background: transparent; cursor: pointer; transition: 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: 'Nunito', sans-serif; text-decoration: none;
        }
        .struk-btn-home { border-color: #00e5ff; color: #00e5ff; }
        .struk-btn-home:hover { background: rgba(0,229,255,0.12); box-shadow: 0 0 20px rgba(0,229,255,0.25); transform: translateY(-2px); }
        .struk-btn-share { border-color: #00ff88; color: #00ff88; }
        .struk-btn-share:hover { background: rgba(0,255,136,0.12); box-shadow: 0 0 20px rgba(0,255,136,0.25); transform: translateY(-2px); }

        /* Timestamp footer */
        .struk-timestamp { text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); font-weight: 700; margin-top: 18px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Confetti -->
    <div class="confetti-wrap" id="confettiWrap"></div>

    <nav class="navbar">
        <div class="nav-left">
            <span class="nav-brand">DzzXNzz</span>
        </div>
        <div class="nav-right">
            <div class="coins-wrapper">🪙 <span id="coinCount">0</span> +</div>
            <div class="user-avatar"><img src="../image/profile.jpg" alt="User" onerror="this.src='https://ui-avatars.com/api/?name=User&background=06070f&color=00e5ff&bold=true'"></div>
        </div>
    </nav>

    <main class="main-content">
        <div class="struk-card" id="strukCard" style="display:none">
            <div class="struk-bar"></div>
            <div class="struk-body">
                <!-- Success icon -->
                <div class="success-icon-wrap">
                    <div class="success-icon"><i class="fas fa-check"></i></div>
                    <div class="success-title">Pembayaran Berhasil!</div>
                    <div class="success-sub">Top up coins kamu sudah diproses</div>
                </div>

                <!-- Coins added -->
                <div class="coins-added">
                    <span class="coins-added-icon">🪙</span>
                    <div>
                        <div class="coins-added-label">Coins Ditambahkan</div>
                        <div class="coins-added-amount" id="coinsAdded">+0</div>
                    </div>
                </div>

                <div class="struk-divider"><span>Detail Transaksi</span></div>

                <!-- Detail -->
                <div class="detail-list">
                    <div class="detail-row">
                        <div class="detail-row-label"><i class="fas fa-hashtag"></i><span>Order ID</span></div>
                        <div class="detail-row-value" id="detailOrderId">-</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-row-label"><i class="fas fa-coins"></i><span>Nominal</span></div>
                        <div class="detail-row-value cyan" id="detailAmount">-</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-row-label"><i class="fas fa-credit-card"></i><span>Metode</span></div>
                        <div class="detail-row-value" id="detailMethod">QRIS</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-row-label"><i class="fas fa-calendar"></i><span>Tanggal</span></div>
                        <div class="detail-row-value" id="detailTanggal">-</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-row-label"><i class="fas fa-clock"></i><span>Waktu</span></div>
                        <div class="detail-row-value" id="detailWaktu">-</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-row-label"><i class="fas fa-check-circle"></i><span>Status</span></div>
                        <div class="detail-row-value green">✔ Berhasil</div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="struk-actions">
                    <a href="/" class="struk-btn struk-btn-home"><i class="fas fa-home"></i> Home</a>
                    <button class="struk-btn struk-btn-share" id="shareBtn"><i class="fas fa-share-alt"></i> Bagikan</button>
                </div>

                <div class="struk-timestamp" id="strukturTimestamp"></div>
            </div>
        </div>
    </main>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader-rings"><div class="ring ring-outer"></div><div class="ring ring-inner"></div></div>
        <div class="loading-text">Memuat struk...</div>
    </div>

    <script src="../script.js"></script>
    <script>
        (function () {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order_id');

            if (!orderId) { window.location.href = '/'; return; }

            const loadingOverlay = document.getElementById('loadingOverlay');
            const strukCard = document.getElementById('strukCard');

            // ===== Confetti =====
            function launchConfetti() {
                const colors = ['#00e5ff','#00ff88','#ff4de4','#ffe000','#bf00ff','#ff7b00'];
                const wrap = document.getElementById('confettiWrap');
                if (!wrap) return;
                for (let i = 0; i < 60; i++) {
                    const piece = document.createElement('div');
                    piece.className = 'confetti-piece';
                    piece.style.cssText = `
                        left: ${Math.random() * 100}%;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        width: ${6 + Math.random() * 8}px;
                        height: ${6 + Math.random() * 8}px;
                        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                        animation-duration: ${2 + Math.random() * 3}s;
                        animation-delay: ${Math.random() * 1.5}s;
                    `;
                    wrap.appendChild(piece);
                }
                setTimeout(() => { if (wrap) wrap.innerHTML = ''; }, 6000);
            }

            // ===== Tampilkan struk =====
            function showStruk(data) {
                const ts = data.completed_at || data.created_at || new Date().toISOString();
                const date = new Date(ts);

                document.getElementById('detailOrderId').textContent = data.order_id;
                document.getElementById('detailAmount').textContent = 'Rp ' + Number(data.amount).toLocaleString('id-ID');
                document.getElementById('coinsAdded').textContent = '+' + Number(data.amount).toLocaleString('id-ID');
                document.getElementById('detailMethod').textContent = (data.payment_method || 'QRIS').toUpperCase();
                document.getElementById('detailTanggal').textContent = date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                document.getElementById('detailWaktu').textContent = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('strukturTimestamp').textContent = 'Diproses pada ' + date.toLocaleString('id-ID');

                // Update coinCount di navbar
                const coinCountEl = document.getElementById('coinCount');
                if (coinCountEl) coinCountEl.textContent = Number(data.amount).toLocaleString('id-ID');

                // Sembunyikan loading, tampilkan struk
                loadingOverlay.classList.add('hidden');
                strukCard.style.display = 'block';
                launchConfetti();
            }

            // ===== Fetch transaksi =====
            fetch(`/api/get-transaction?order_id=${orderId}`)
                .then(r => r.json())
                .then(data => {
                    if (data && !data.error) {
                        showStruk(data);
                    } else {
                        // Fallback dengan order_id saja
                        showStruk({ order_id: orderId, amount: 0, completed_at: new Date().toISOString() });
                    }
                })
                .catch(() => {
                    showStruk({ order_id: orderId, amount: 0, completed_at: new Date().toISOString() });
                });

            // ===== Share button =====
            document.getElementById('shareBtn')?.addEventListener('click', function () {
                if (navigator.share) {
                    navigator.share({
                        title: 'Top Up Berhasil - DzzXNzz',
                        text: `Top up coins berhasil! Order ID: ${orderId}`,
                        url: window.location.href
                    });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert('Link struk berhasil disalin!');
                }
            });
        })();
    </script>
</body>
</html>
